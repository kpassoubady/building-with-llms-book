<text x="40" y="499.05" font-family="Virgil, Segoe Print, Comic Sans MS, sans-serif" font-size="13" fill="#868e96" text-anchor="start" opacity="1">Reliability drops the more the model has to rely on memory instead of the prompt.</text>
