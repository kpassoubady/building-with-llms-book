<svg xmlns="http://www.w3.org/2000/svg" width="800" height="529.25" viewBox="20 -5 800 529.25">
<rect x="20" y="-5" width="800" height="529.25" fill="#ffffff"/>
<text x="40" y="32" font-family="Virgil, Segoe Print, Comic Sans MS, sans-serif" font-size="20" fill="#1e1e1e" text-anchor="start" opacity="1">The Sweet Spot: When the Answer Is Already There</text>
