<text x="70" y="101.6" font-family="Virgil, Segoe Print, Comic Sans MS, sans-serif" font-size="16" fill="#2f9e44" text-anchor="start" opacity="1">Answer is in the prompt</text>
<text x="70" y="123.05" font-family="Virgil, Segoe Print, Comic Sans MS, sans-serif" font-size="13" fill="#2f9e44" text-anchor="start" opacity="1">or follows a known template  →  Reliable</text>
